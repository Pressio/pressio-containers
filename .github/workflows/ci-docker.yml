name: pressio-containers

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [ opened, reopened, synchronize ]
    paths:
      - '.github/workflows/ci-docker.yml'
      - 'docker_scripts/**'
  schedule:
    - cron:  '0 5 * * FRI'

jobs:
  CI:
    strategy:
      matrix:
        dockerfile:
          - ubuntu-01
          - ubuntu-02
          - ubuntu-03
          - ubuntu-04
          - ubuntu-05
          - ubuntu-06
          - ubuntu-07
          - ubuntu-08
          - ubuntu-09

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TODO: Add a "test" that runs pressio with the built containers
      # before pushing

      - name: Build and Push Docker images for Github Container Registry
        uses: docker/build-push-action@v6
        with:
          # Only push image if running on main or develop
          tags: ghcr.io/pressio/${{ matrix.dockerfile }}
          file: docker_scripts/${{ matrix.dockerfile }}.dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
